<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genico</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page">
    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="icon" aria-hidden="true">
                    <svg class="icon-svg" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                        <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="8.5" cy="10" r="1.5" fill="currentColor"/>
                        <path d="M3 17l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                Genico
            </h1>
            <p class="subtitle">アップロードした画像を様々なサイズのアイコンに変換します</p>
        </header>

        <main class="main">
            <!-- アップロードエリア -->
            <section class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <div class="upload-icon" aria-hidden="true">
                            <svg class="upload-icon-svg" width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                                <path d="M12 16V8m0 0l-3 3m3-3l3 3M5 19h14a2 2 0 002-2v-3a2 2 0 00-2-2h-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M5 11V7a2 2 0 012-2h3l2-2h2l2 2h3a2 2 0 012 2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <h3>画像をアップロード</h3>
                        <p>ドラッグ&ドロップまたはクリックしてファイルを選択</p>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <button type="button" class="upload-btn" onclick="document.getElementById('fileInput').click()">
                            ファイルを選択
                        </button>
                    </div>
                </div>

                <!-- プレビューエリア -->
                <div class="preview-area" id="previewArea" style="display: none;">
                    <div class="preview-header">
                        <h3>プレビュー</h3>
                        <button type="button" class="clear-btn" id="clearBtn" aria-label="プレビューを閉じる">×</button>
                    </div>
                    <div class="preview-content">
                        <img id="previewImage" alt="プレビュー画像">
                        <div class="image-info" id="imageInfo"></div>
                    </div>
                </div>
            </section>

            <!-- プリセット選択エリア -->
            <section class="preset-section">
                <h2>プリセットを選択して変換</h2>
                <div class="preset-grid" id="presetGrid">
                    <!-- プリセットカードがここに動的に追加される -->
                </div>

                <!-- カスタムサイズオプション -->
                <div class="custom-section">
                    <h3>カスタムサイズ</h3>
                    <div class="custom-input-group">
                        <input type="text" id="customSizes" placeholder="例: 16,32,48,64"
                               pattern="[0-9, ]+" title="カンマ区切りでサイズを入力">
                        <button type="button" class="custom-btn" id="customBtn">カスタムサイズで変換</button>
                    </div>
                </div>
            </section>

            <!-- 処理中表示 -->
            <div class="processing" id="processing" style="display: none;">
                <div class="spinner" role="status" aria-label="処理中"></div>
                <p>画像を処理中...</p>
            </div>

            <!-- エラーメッセージ -->
            <div class="error-message" id="errorMessage" style="display: none;" role="alert">
                <span class="error-icon" aria-hidden="true">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                        <path d="M12 3L2 20h20L12 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <path d="M12 9v5M12 17h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="error-text"></span>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Genico. シンプルで使いやすいアイコン変換ツール</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
